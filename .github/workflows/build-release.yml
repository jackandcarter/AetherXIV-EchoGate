name: Build and release artifacts

on:
  workflow_dispatch:
    inputs:
      version_label:
        description: Version label used in artifact filenames.
        required: true
        default: v1.3
      publish_release:
        description: Create or update a GitHub Release after building.
        type: boolean
        required: true
        default: false
      release_tag:
        description: Release tag to create or update when publish_release is enabled.
        required: true
        default: release-v1.3
      include_server_core:
        description: Build the server core package.
        type: boolean
        required: true
        default: true
  push:
    branches:
      - "v1.3---Umbra"
      - "1.3-umbra"
    tags:
      - "release-*"
      - "v*"

permissions:
  contents: write

env:
  CONFIGURATION: Release
  DOTNET_VERSION: 10.0.x

jobs:
  umbra-framework:
    name: Umbra client framework
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Umbra framework bundle
        shell: pwsh
        env:
          RELEASE_LABEL: ${{ github.event_name == 'push' && github.ref_name || inputs.version_label }}
          RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
        run: |
          $ErrorActionPreference = "Stop"
          $label = $env:RELEASE_LABEL
          if ([string]::IsNullOrWhiteSpace($label)) { $label = "manual-build" }
          if ($label.StartsWith("release-")) { $label = $label.Substring(8) }
          $label = $label.Replace("/", "-")
          $version = $label.TrimStart("v")
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "0.1.0" }

          $frameworkProject = "launcher/Umbra/Aether.Umbra.Framework/Aether.Umbra.Framework.csproj"
          $bootstrapProject = "launcher/Umbra/Aether.Umbra.Bootstrap/Aether.Umbra.Bootstrap.vcxproj"
          $nativeInjectorProject = "launcher/EchoGate/EchoGate.NativeInjector/EchoGate.NativeInjector.vcxproj"
          $workspaceRoot = (Get-Location).Path
          $bundleRoot = Join-Path $workspaceRoot "build/umbra-framework/Umbra/Framework"
          $managedOutput = Join-Path $bundleRoot "Managed"
          $nativeInjectorOutput = Join-Path $workspaceRoot "build/umbra-native-injector"
          New-Item -ItemType Directory -Force -Path $managedOutput | Out-Null
          New-Item -ItemType Directory -Force -Path $nativeInjectorOutput | Out-Null

          dotnet publish $frameworkProject --configuration $env:CONFIGURATION --runtime win-x86 --self-contained true --output $managedOutput /p:PublishSingleFile=false /p:UseAppHost=true
          msbuild $bootstrapProject /p:Configuration=Release /p:Platform=Win32 /p:OutDir="$bundleRoot\\" /p:TargetName=Aether.Umbra.Bootstrap.x86
          msbuild $nativeInjectorProject /p:Configuration=Release /p:Platform=Win32 /p:OutDir="$nativeInjectorOutput\\" /p:TargetName=Umbra.NativeInjector.x86
          if (!(Test-Path (Join-Path $bundleRoot "Aether.Umbra.Bootstrap.x86.dll"))) { throw "Umbra bootstrap DLL was not produced in $bundleRoot" }
          if (!(Test-Path (Join-Path $nativeInjectorOutput "Umbra.NativeInjector.x86.exe"))) { throw "Umbra native injector was not produced in $nativeInjectorOutput" }

          Copy-Item "launcher/Umbra/assets/umbra-icon.svg" "$bundleRoot/umbra-icon.svg" -Force
          Set-Content -Path "$bundleRoot/version.txt" -Value $version

          $manifest = [ordered]@{
            name = "Aether Umbra"
            version = $version
            api_version = "1.0"
            platform_rid = "win-x86"
            bootstrap_relative_path = "Aether.Umbra.Bootstrap.x86.dll"
            framework_relative_path = "Managed/Aether.Umbra.Framework.dll"
            supported_game_sha256 = @("9341f2b4567440b310a4d494f5cc5599ca334ba51c8042247317ff466492f2e9")
          }
          $manifest | ConvertTo-Json -Depth 8 | Set-Content -Path "$bundleRoot/umbra-framework.json"

          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $archiveName = "AetherXIV-Umbra-Framework-$label.zip"
          $archivePath = "artifacts/$archiveName"
          Compress-Archive -Path "build/umbra-framework/Umbra" -DestinationPath $archivePath -Force

          $sizeBytes = (Get-Item $archivePath).Length
          $sha256 = (Get-FileHash $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          $releaseTag = $env:RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($releaseTag)) { $releaseTag = "release-$label" }
          $archiveUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$releaseTag/$archiveName"
          $supportedGameSha256 = "9341f2b4567440b310a4d494f5cc5599ca334ba51c8042247317ff466492f2e9"

          $catalog = [ordered]@{
            platform = "win-x86"
            artifacts = @(
              [ordered]@{
                name = "Aether Umbra"
                version = $version
                api_version = "1.0"
                platform_rid = "win-x86"
                archive_url = $archiveUrl
                archive_format = "zip"
                size_bytes = $sizeBytes
                sha256 = $sha256
                bootstrap_relative_path = "Aether.Umbra.Bootstrap.x86.dll"
                framework_relative_path = "Managed/Aether.Umbra.Framework.dll"
                supported_game_sha256 = @($supportedGameSha256)
                is_default = $true
                is_active = $true
                sort_order = 0
              }
            )
          }
          $catalog | ConvertTo-Json -Depth 8 | Set-Content -Path "artifacts/AetherXIV-Umbra-Framework-$label.catalog.json"

          $sql = @"
          CREATE TABLE IF NOT EXISTS launcher_umbra_framework_artifacts (
            id int(11) unsigned NOT NULL AUTO_INCREMENT,
            name varchar(120) NOT NULL,
            version varchar(64) NOT NULL,
            api_version varchar(32) NOT NULL DEFAULT '1.0',
            platform_rid varchar(32) NOT NULL DEFAULT 'win-x86',
            archive_url varchar(500) NOT NULL,
            archive_format varchar(16) NOT NULL DEFAULT 'zip',
            size_bytes bigint(20) NOT NULL,
            sha256 char(64) NOT NULL,
            bootstrap_relative_path varchar(255) NOT NULL DEFAULT 'Aether.Umbra.Bootstrap.x86.dll',
            framework_relative_path varchar(255) NOT NULL DEFAULT 'Managed/Aether.Umbra.Framework.dll',
            supported_game_sha256 text NULL,
            is_default tinyint(1) NOT NULL DEFAULT 0,
            is_active tinyint(1) NOT NULL DEFAULT 1,
            sort_order int(11) NOT NULL DEFAULT 0,
            created_at timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
            updated_at timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
            PRIMARY KEY (id),
            KEY idx_launcher_umbra_framework_platform (platform_rid, is_active, is_default, sort_order)
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8;

          DELETE FROM launcher_umbra_framework_artifacts
          WHERE name = 'Aether Umbra'
            AND version = '$version'
            AND platform_rid = 'win-x86';

          INSERT INTO launcher_umbra_framework_artifacts
            (name, version, api_version, platform_rid, archive_url, archive_format,
             size_bytes, sha256, bootstrap_relative_path, framework_relative_path,
             supported_game_sha256, is_default, is_active, sort_order)
          VALUES
            ('Aether Umbra', '$version', '1.0', 'win-x86',
             '$archiveUrl', 'zip',
             $sizeBytes, '$sha256', 'Aether.Umbra.Bootstrap.x86.dll',
             'Managed/Aether.Umbra.Framework.dll',
             '$supportedGameSha256', 1, 1, 0);
          "@
          $sql | Set-Content -Path "artifacts/AetherXIV-Umbra-Framework-$label.sql"

      - name: Upload internal Umbra bundle
        uses: actions/upload-artifact@v4
        with:
          name: umbra-framework-bundle
          path: build/umbra-framework/Umbra
          if-no-files-found: error

      - name: Upload Umbra release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-AetherXIV-Umbra-Framework
          path: artifacts/*
          if-no-files-found: error

      - name: Upload native x86 injector
        uses: actions/upload-artifact@v4
        with:
          name: umbra-native-injector
          path: build/umbra-native-injector/Umbra.NativeInjector.x86.exe
          if-no-files-found: error

  echo-gate-linux:
    name: Echo Gate Linux ${{ matrix.rid }}
    runs-on: ubuntu-latest
    needs: umbra-framework
    strategy:
      fail-fast: false
      matrix:
        rid:
          - linux-x64
          - linux-arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download Umbra framework bundle
        uses: actions/download-artifact@v4
        with:
          name: umbra-framework-bundle
          path: umbra-framework-bundle

      - name: Download native x86 injector
        uses: actions/download-artifact@v4
        with:
          name: umbra-native-injector
          path: umbra-native-injector

      - name: Build launcher
        env:
          RELEASE_LABEL: ${{ github.event_name == 'push' && github.ref_name || inputs.version_label }}
        run: |
          set -euo pipefail
          ./tools/bootstrap-ubuntu-build.sh --no-install --launcher-only --no-wine --rid "${{ matrix.rid }}"
          rm -rf "build/echo-gate/${{ matrix.rid }}/publish/Umbra"
          cp -R "umbra-framework-bundle" "build/echo-gate/${{ matrix.rid }}/publish/Umbra"
          for helper_rid in win-x64 win-x86; do
            helper_dir="build/echo-gate/${{ matrix.rid }}/publish/Helpers/$helper_rid"
            if [[ -d "$helper_dir" ]]; then
              cp "umbra-native-injector/Umbra.NativeInjector.x86.exe" "$helper_dir/Umbra.NativeInjector.x86.exe"
            fi
          done
          label="${RELEASE_LABEL:-manual-build}"
          label="${label#release-}"
          label="${label//\//-}"
          mkdir -p artifacts
          tar --exclude='.DS_Store' -czf "artifacts/EchoGate-${{ matrix.rid }}-${label}.tar.gz" -C build/echo-gate "${{ matrix.rid }}"

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-EchoGate-${{ matrix.rid }}
          path: artifacts/*
          if-no-files-found: error

  echo-gate-macos:
    name: EchoGate macOS ${{ matrix.rid }}
    runs-on: macos-latest
    needs: umbra-framework
    strategy:
      fail-fast: false
      matrix:
        rid:
          - osx-arm64
          - osx-x64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download Umbra framework bundle
        uses: actions/download-artifact@v4
        with:
          name: umbra-framework-bundle
          path: umbra-framework-bundle

      - name: Download native x86 injector
        uses: actions/download-artifact@v4
        with:
          name: umbra-native-injector
          path: umbra-native-injector

      - name: Build app bundle
        env:
          RELEASE_LABEL: ${{ github.event_name == 'push' && github.ref_name || inputs.version_label }}
        run: |
          set -euo pipefail
          label="${RELEASE_LABEL:-manual-build}"
          label="${label#release-}"
          label="${label//\//-}"
          INCLUDE_UMBRA_DEV_FRAMEWORK=0 VERSION="${label#v}" RUNTIME_IDENTIFIER="${{ matrix.rid }}" ./tools/build-echo-gate-macos.sh
          mkdir -p artifacts
          build_root="build/echo-gate/macos-${{ matrix.rid }}"
          rm -rf "$build_root/EchoGate.app/Contents/MacOS/Umbra"
          cp -R "umbra-framework-bundle" "$build_root/EchoGate.app/Contents/MacOS/Umbra"
          for helper_rid in win-x64 win-x86; do
            helper_dir="$build_root/EchoGate.app/Contents/MacOS/Helpers/$helper_rid"
            if [[ -d "$helper_dir" ]]; then
              cp "umbra-native-injector/Umbra.NativeInjector.x86.exe" "$helper_dir/Umbra.NativeInjector.x86.exe"
            fi
          done
          ditto -c -k --sequesterRsrc --keepParent "$build_root/EchoGate.app" "artifacts/EchoGate-${{ matrix.rid }}-${label}.zip"

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-EchoGate-${{ matrix.rid }}
          path: artifacts/*
          if-no-files-found: error

  echo-gate-windows:
    name: Echo Gate Windows ${{ matrix.rid }}
    runs-on: windows-latest
    needs: umbra-framework
    strategy:
      fail-fast: false
      matrix:
        rid:
          - win-x86
          - win-x64
          - win-arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download Umbra framework bundle
        uses: actions/download-artifact@v4
        with:
          name: umbra-framework-bundle
          path: umbra-framework-bundle

      - name: Download native x86 injector
        uses: actions/download-artifact@v4
        with:
          name: umbra-native-injector
          path: umbra-native-injector

      - name: Build launcher
        shell: pwsh
        env:
          RELEASE_LABEL: ${{ github.event_name == 'push' && github.ref_name || inputs.version_label }}
        run: |
          $ErrorActionPreference = "Stop"
          $rid = "${{ matrix.rid }}"
          $label = $env:RELEASE_LABEL
          if ([string]::IsNullOrWhiteSpace($label)) { $label = "manual-build" }
          if ($label.StartsWith("release-")) { $label = $label.Substring(8) }
          $label = $label.Replace("/", "-")

          $project = "launcher/EchoGate/EchoGate.App/EchoGate.App.csproj"
          $helperProject = "launcher/EchoGate/EchoGate.ClientLauncher/EchoGate.ClientLauncher.csproj"
          $bundle = "build/echo-gate/$rid"
          $output = "$bundle/publish"

          dotnet publish $project --configuration $env:CONFIGURATION --runtime $rid --self-contained true --output $output /p:PublishSingleFile=false /p:UseAppHost=true

          if ($rid -eq "win-x86") {
            $helperRids = @("win-x86")
          } elseif ($rid -eq "win-x64") {
            $helperRids = @("win-x64", "win-x86")
          } else {
            $helperRids = @("win-arm64", "win-x64", "win-x86")
          }

          foreach ($helperRid in $helperRids) {
            dotnet publish $helperProject --configuration $env:CONFIGURATION --runtime $helperRid --self-contained true --output "$output/Helpers/$helperRid" /p:PublishSingleFile=false /p:UseAppHost=true
          }

          if (Test-Path "$output/Umbra") { Remove-Item "$output/Umbra" -Recurse -Force }
          Copy-Item "umbra-framework-bundle" "$output/Umbra" -Recurse -Force
          foreach ($helperRid in @("win-x64", "win-x86")) {
            $helperDir = "$output/Helpers/$helperRid"
            if (Test-Path $helperDir) {
              Copy-Item "umbra-native-injector/Umbra.NativeInjector.x86.exe" "$helperDir/Umbra.NativeInjector.x86.exe" -Force
            }
          }

          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path "$bundle/publish" -DestinationPath "artifacts/EchoGate-$rid-$label.zip" -Force

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-EchoGate-${{ matrix.rid }}
          path: artifacts/*
          if-no-files-found: error

  windows-tools:
    name: Windows tool validation
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Parse Windows PowerShell scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          foreach ($file in Get-ChildItem tools/windows -Filter *.ps1) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
              throw "PowerShell parse failed: $($file.FullName)"
            }
            Write-Host "ok: $($file.FullName)"
          }

      - name: Check Windows scripts for stale Meteor executable names
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $matches = Select-String -Path tools/windows/*.ps1 -Pattern 'MeteorXIV\.Core\.(Lobby|Map|World)\.exe' -AllMatches
          if ($matches) {
            $matches | ForEach-Object { Write-Error "$($_.Path):$($_.LineNumber): $($_.Line.Trim())" }
            throw "Windows launch scripts must reference AetherXIV server executables."
          }

      - name: Run prerequisite check in dry mode
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          .\tools\windows\install-prereqs.ps1 -Mode Build

  server-core:
    name: AetherXIV Server Core
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || inputs.include_server_core }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build legacy servers
        env:
          AUTO_PREPARE_STATICACTORS: "0"
        run: |
          set -euo pipefail
          ./tools/bootstrap-ubuntu-build.sh --yes --legacy-only --no-wine

      - name: Package server core
        env:
          RELEASE_LABEL: ${{ github.event_name == 'push' && github.ref_name || inputs.version_label }}
        run: |
          set -euo pipefail
          label="${RELEASE_LABEL:-manual-build}"
          label="${label#release-}"
          label="${label//\//-}"

          package_root="dist/server-core"
          mkdir -p "$package_root"

          cp -R "Lobby Server/bin/Release" "$package_root/Lobby Server"
          cp -R "Map Server/bin/Release" "$package_root/Map Server"
          cp -R "World Server/bin/Release" "$package_root/World Server"

          for service in Lobby Map World; do
            exe="$package_root/$service Server/AetherXIV.Core.$service.exe"
            if [[ ! -f "$exe" ]]; then
              echo "Missing packaged server executable: $exe" >&2
              exit 1
            fi
          done
          if find "$package_root" -name 'MeteorXIV.Core.*.exe' -print -quit | grep -q .; then
            echo "Server core package contains stale MeteorXIV executables." >&2
            find "$package_root" -name 'MeteorXIV.Core.*.exe' -print >&2
            exit 1
          fi

          mkdir -p "$package_root/Data"
          cp -R Data/sql "$package_root/Data/sql"
          cp -R Data/www "$package_root/Data/www"
          cp -R Data/scripts "$package_root/Data/scripts"
          cp Data/lobby_config.ini Data/world_config.ini Data/map_config.ini "$package_root/Data/"

          mkdir -p "$package_root/tools"
          cp tools/load-local-env.sh \
             tools/setup-local-db.sh \
             tools/import-db.sh \
             tools/create-db-user.sh \
             tools/copy-runtime-data.sh \
             tools/prepare-client-data.sh \
             tools/run-web.sh \
             tools/run-lobby.sh \
             tools/run-map.sh \
             tools/run-world.sh \
             tools/smoke-local.sh \
             tools/audit-env.sh \
             "$package_root/tools/"
          cp -R tools/windows "$package_root/tools/windows"

          cp README.md CHANGELOG.md .env.defaults "$package_root/"
          cp -R docs "$package_root/docs"

          cat > "$package_root/README_RELEASE.txt" <<'EOF'
          AetherXIV Server Core release package

          This package contains the built Lobby, Map, and World server outputs plus the SQL, PHP launcher services, configs, scripts, setup helpers, and documentation needed for self-hosting.

          It does not include client files, patch files, patch torrents, Wine runtimes, or Data/staticactors.bin. Prepare staticactors.bin locally from your own FFXIV 1.x client folder before running Map Server for real playtests.

          Start with docs/RELEASES.md, then follow the platform guide for your host OS.
          EOF

          find "$package_root" -name '.DS_Store' -delete
          find "$package_root" -name 'staticactors.bin' -delete
          find "$package_root/Data/www" -name '*.local.php' -delete

          mkdir -p artifacts
          tar -czf "artifacts/AetherXIV-Server-Core-${label}.tar.gz" -C dist server-core
          (cd dist && zip -qr "../artifacts/AetherXIV-Server-Core-${label}.zip" server-core)

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-AetherXIV-Server-Core
          path: artifacts/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - umbra-framework
      - echo-gate-linux
      - echo-gate-macos
      - echo-gate-windows
      - windows-tools
      - server-core
    if: ${{ always() && !cancelled() && !contains(needs.*.result, 'failure') && ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || inputs.publish_release) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          release_tag="$REF_NAME"
          if [[ "$EVENT_NAME" != "push" ]]; then
            release_tag="${INPUT_RELEASE_TAG:-release-v1.3}"
          fi

          release_label="${release_tag#release-}"
          notes_file="docs/releases/${release_label}.md"
          if [[ ! -f "$notes_file" ]]; then
            notes_file="docs/RELEASES.md"
          fi

          title="AetherXIV Core + Echo Gate ${release_label}"
          mapfile -t assets < <(find release-assets -type f | sort)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          if gh release view "$release_tag" >/dev/null 2>&1; then
            gh release upload "$release_tag" "${assets[@]}" --clobber
          else
            if git ls-remote --tags origin "refs/tags/$release_tag" | grep -q "refs/tags/$release_tag"; then
              gh release create "$release_tag" "${assets[@]}" --title "$title" --notes-file "$notes_file"
            else
              gh release create "$release_tag" "${assets[@]}" --target "$GITHUB_SHA" --title "$title" --notes-file "$notes_file"
            fi
          fi
